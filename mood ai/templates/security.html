<h2>Security Logs</h2>
<table border="1">
<tr>
    <th>Username</th>
    <th>Action</th>
    <th>IP</th>
    <th>Time</th>
</tr>

{% for log in logs %}
<tr>
    <td>{{ log['username'] }}</td>
    <td>{{ log['action'] }}</td>
    <td>{{ log['ip_address'] }}</td>
    <td>{{ log['created_at'] }}</td>
</tr>
{% endfor %}
</table>
